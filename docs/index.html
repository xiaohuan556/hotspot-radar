<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点雷达</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;background:#F8FAFC;color:#1E293B}
.app{max-width:1100px;margin:0 auto;padding:24px 32px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo{font-size:28px}
.title{font-size:22px;font-weight:800;color:#0F172A}
.subtitle{font-size:12px;color:#94A3B8;margin-left:4px}
.spacer{flex:1}
.btn-refresh{background:#3B82F6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;padding:10px 22px;cursor:pointer}
.btn-refresh:hover{background:#2563EB}
.btn-refresh:disabled{background:#CBD5E1;color:#94A3B8;cursor:not-allowed}
.status-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.progress-bar{flex:1;height:3px;background:#E2E8F0;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#3B82F6;border-radius:2px;width:0%;transition:width .3s}
.status-text{font-size:11px;color:#94A3B8;white-space:nowrap}
.tabs{display:flex;gap:0;border-bottom:2px solid #F1F5F9}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:#64748B;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--tab-color)}
.tab.active{color:var(--tab-color);border-bottom-color:var(--tab-color);font-weight:600}
.content{padding-top:16px}
.panel{display:none}
.panel.active{display:block}
.list-header{display:flex;align-items:center;gap:8px;padding:0 0 8px 0;font-size:10px;font-weight:600;color:#94A3B8}
.list-header .h-rank{width:24px;text-align:center}
.h-trans{width:26px}
.h-bar{width:4px}
.h-title{flex:1}
.h-actions{display:flex;align-items:center;gap:8px}
.btn-translate-all{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid var(--cat-color);color:var(--cat-color);background:transparent;cursor:pointer;white-space:nowrap}
.btn-translate-all:hover{background:var(--cat-color-bg)}
.btn-translate-all:disabled{color:#C0C8D4;border-color:#E2E8F0;cursor:not-allowed}
.count{font-size:10px;color:#94A3B8;white-space:nowrap}
.divider{height:1px;background:#F1F5F9;margin-bottom:10px}
.item-list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff;border:1px solid #E8ECF1;border-radius:10px;cursor:pointer;transition:all .15s}
.item:hover{background:#F0F6FF;border-color:#BFDBFE}
.i-rank{width:24px;text-align:center;font-size:11px;font-weight:700;color:var(--cat-color);flex-shrink:0}
.i-trans{width:26px;height:26px;border-radius:5px;border:1px solid #E8ECF1;border-color:color-mix(in srgb,var(--cat-color) 30%,transparent);color:var(--cat-color);background:transparent;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.i-trans:hover{background:color-mix(in srgb,var(--cat-color) 12%,transparent)}
.i-trans.done{background:color-mix(in srgb,var(--cat-color) 15%,transparent)}
.i-bar{width:4px;height:26px;border-radius:2px;background:var(--cat-color);flex-shrink:0}
.i-title{flex:1;font-size:13px;color:#1E293B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.i-title.translated{color:var(--cat-color);font-weight:500}
.i-source{font-size:10px;color:#475569;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:3px;padding:1px 6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.i-heat{font-size:10px;color:#94A3B8;min-width:46px;text-align:right;flex-shrink:0}
.hint{color:#94A3B8;font-size:11px;padding:16px 0;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="logo">📡</span>
    <div><span class="title">热点雷达</span><span class="subtitle">海外热点聚合 · 双击跳转原文</span></div>
    <span class="spacer"></span>
    <button class="btn-refresh" id="btnRefresh" onclick="refresh()">🔄 刷新热点</button>
  </div>
  <div class="status-bar">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <span class="status-text" id="status">就绪</span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ===== 配置 =====
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
];

async function proxyFetch(url) {
  // 依次尝试多个 CORS 代理
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url));
      if (r.ok) return r;
    } catch(e) { continue; }
  }
  throw new Error('All CORS proxies failed for: ' + url);
}

const CATS = [
  {name:'🔥 热门Meme',  color:'#E0646E'},
  {name:'🌟 娱乐新闻',  color:'#CB9842'},
  {name:'🎬 电影资讯',  color:'#787CE6'},
  {name:'🏈 体育热点',  color:'#44A87A'},
  {name:'📹 视频热点',  color:'#D0659E'},
  {name:'🔍 搜索趋势',  color:'#8B7CF6'},
];

let allData = {};
let currentIdx = 0;

// ═══════════════ 数据获取（与 app.py 完全一致） ═══════════════

// 1) 热门Meme: KYM → Reddit → Google News（与 app.py fetch_memes 对齐）
async function fetchMemes(limit=15) {
  // 优先：Know Your Meme（与 app.py fetch_meme_fallback 对齐）
  try {
    const r = await proxyFetch('https://knowyourmeme.com/memes');
    const text = await r.text();
    const items = [];
    const seen = new Set();
    const pattern = /<a[^>]+href="(\/memes\/[^"]+)"[^>]*>([\s\S]*?)<\/a>/gi;
    let m;
    while ((m = pattern.exec(text)) !== null && items.length < limit) {
      const href = m[1], block = m[2];
      if (href.includes('page/')) continue;
      let title = '';
      const h3m = block.match(/<h3[^>]+class="title"[^>]*>([^<]+)<\/h3>/i);
      if (h3m) { title = h3m[1].trim(); }
      else {
        const spm = block.match(/<span[^>]*>([^<]+)<\/span>/i);
        if (spm) title = spm[1].trim();
      }
      if (!title || seen.has(title) || title.length < 3) continue;
      if (['meme','subculture','event','entry','photo','video','image'].includes(title.toLowerCase())) continue;
      seen.add(title);
      items.push({
        id:'kym_'+btoa(unescape(encodeURIComponent(title))).slice(0,12),
        title, source:'Know Your Meme',
        url:'https://knowyourmeme.com'+href, score:0
      });
    }
    if (items.length > 0) return items;
  } catch(e) { console.warn('[Meme KYM]', e); }

  // 备用：Reddit memes（与 app.py fetch_reddit 对齐）
  try {
    const r = await proxyFetch('https://www.reddit.com/r/memes+dankmemes+me_irl+funny/hot.json?limit=' + limit);
    const data = await r.json();
    const items = (data.data?.children || []).filter(p => !p.data.stickied).map(p => {
      const d = p.data;
      return { id:'r_'+d.id, title:d.title, source:'r/'+d.subreddit, url:'https://reddit.com'+d.permalink, score:d.score||0 };
    });
    if (items.length > 0) return items;
  } catch(e) { console.warn('[Meme Reddit]', e); }

  // 兜底：Google News meme（与 app.py fetch_meme_fallback 降级对齐）
  try {
    const r = await proxyFetch('https://news.google.com/rss/search?q=viral+meme+funny+trending&hl=en-US&gl=US&ceid=US:en');
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = [];
    const kws = ['meme','viral','tiktok','funny','trend','internet'];
    xml.querySelectorAll('item').forEach(item => {
      if (items.length >= limit) return;
      const t = item.querySelector('title')?.textContent;
      if (t && kws.some(k => t.toLowerCase().includes(k))) {
        items.push({
          id:'meme_'+btoa(unescape(encodeURIComponent(t))).slice(0,12),
          title:t.trim(), source:item.querySelector('source')?.textContent||'Google News',
          url:item.querySelector('link')?.textContent||'', score:0
        });
      }
    });
    if (items.length > 0) return items;
  } catch(e) { console.warn('[Meme GoogleNews]', e); }

  return [];
}

// 2) 娱乐新闻: NewsAPI + RSS（与 app.py fetch_newsapi + fetch_rss 对齐）
async function fetchEntertainment() {
  const items = [];
  // NewsAPI
  try {
    const q = 'entertainment+OR+celebrity+OR+Hollywood';
    const r = await proxyFetch('https://newsapi.org/v2/everything?q='+q+'&language=en&sortBy=popularity&pageSize=10&apiKey=3bd17c719f174ce797556f31ffe01f64');
    const data = await r.json();
    (data.articles||[]).forEach(a => {
      items.push({
        id:'n_'+btoa(unescape(encodeURIComponent(a.url))).slice(0,12),
        title:a.title, source:a.source?.name||'News', url:a.url, score:0
      });
    });
  } catch(e) { console.warn('[NewsAPI entertainment]', e); }

  // RSS: entertainment feeds（与 app.py RSS_FEEDS 对齐）
  const feeds = [
    ['Variety','https://variety.com/feed/'],
    ['Deadline','https://deadline.com/feed/'],
    ['Hollywood Reporter','https://feeds.feedburner.com/thr/news'],
    ['Billboard','https://www.billboard.com/feed/'],
  ];
  for (const [name, url] of feeds) {
    try {
      const r = await proxyFetch(url);
      const text = await r.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      xml.querySelectorAll('item').forEach(item => {
        const t = item.querySelector('title')?.textContent;
        const l = item.querySelector('link')?.textContent;
        if (t) items.push({ id:'rss_'+btoa(unescape(encodeURIComponent(t))).slice(0,12), title:t.trim(), source:name, url:l||'', score:0 });
      });
    } catch(e) {}
  }
  return items;
}

// 3) 电影资讯: TMDB（与 app.py fetch_tmdb 对齐）
async function fetchTMDB() {
  const items = [];
  const key = '9f842807e0c4919d22ad8903bbd210a4';
  for (const ep of ['/movie/upcoming','/trending/movie/week']) {
    try {
      const r = await fetch('https://api.themoviedb.org/3'+ep+'?api_key='+key+'&language=zh-CN&region=US');
      const data = await r.json();
      (data.results||[]).slice(0,10).forEach(i => {
        items.push({
          id:'tmdb_'+i.id, title:i.title, source:'TMDB',
          url:'https://www.themoviedb.org/movie/'+i.id,
          score:Math.round((i.vote_average||0)*100)
        });
      });
    } catch(e) { console.warn('[TMDB]', e); }
  }
  return items;
}

// 4) 体育热点: RSS（与 app.py fetch_rss sports 对齐）
async function fetchSports() {
  const items = [];
  const feeds = [
    ['ESPN','https://www.espn.com/espn/rss/news'],
    ['BBC Sport','https://feeds.bbci.co.uk/sport/rss.xml'],
    ['Yahoo Sports','https://sports.yahoo.com/rss/'],
  ];
  for (const [name, url] of feeds) {
    try {
      const r = await proxyFetch(url);
      const text = await r.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      xml.querySelectorAll('item').forEach(item => {
        const t = item.querySelector('title')?.textContent;
        const l = item.querySelector('link')?.textContent;
        if (t) items.push({ id:'rss_'+btoa(unescape(encodeURIComponent(t))).slice(0,12), title:t.trim(), source:name, url:l||'', score:0 });
      });
    } catch(e) {}
  }
  return items;
}

// 5) 视频热点: YouTube（与 app.py fetch_youtube 对齐）
async function fetchYouTube() {
  try {
    const key = 'AIzaSyAFsEN9EiBrn9mZzmh3Yl1fMIdBCZMv8FM';
    const r = await fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=12&key='+key);
    const data = await r.json();
    return (data.items||[]).map(i => ({
      id:'yt_'+i.id, title:i.snippet.title, source:i.snippet.channelTitle,
      url:'https://youtube.com/watch?v='+i.id, score:0
    }));
  } catch(e) { console.warn('[YouTube]', e); return []; }
}

// 6) 搜索趋势: Google Trends RSS（与 app.py fetch_google_trends 对齐）
async function fetchGoogleTrends(limit=20) {
  try {
    const r = await proxyFetch('https://trends.google.com/trending/rss?geo=US');
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = [];
    xml.querySelectorAll('item').forEach((item, i) => {
      if (i >= limit) return;
      const t = item.querySelector('title')?.textContent;
      const traffic = item.getElementsByTagName('ht:approx_traffic')[0]?.textContent
                   || item.querySelector('approx_traffic')?.textContent || '';
      const newsTitle = item.getElementsByTagName('ht:news_item_title')[0]?.textContent
                      || item.querySelector('news_item_title')?.textContent || '';
      const newsUrl = item.getElementsByTagName('ht:news_item_url')[0]?.textContent
                    || item.querySelector('news_item_url')?.textContent || '';
      if (t) items.push({
        id:'gtr_'+btoa(unescape(encodeURIComponent(t))).slice(0,12),
        title:t.trim(), source:'Google Trends',
        url: newsUrl || 'https://trends.google.com/trends/explore?q='+encodeURIComponent(t.trim()),
        score:0, desc: newsTitle || (traffic ? '搜索量: '+traffic : '')
      });
    });
    return items;
  } catch(e) { console.warn('[GoogleTrends]', e); return []; }
}

// 翻译（DeepSeek）
async function translateText(text) {
  try {
    const r = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method:'POST',
      headers:{'Authorization':'Bearer sk-2b1544c282cd44709b2408745f77726c','Content-Type':'application/json'},
      body:JSON.stringify({model:'deepseek-chat',messages:[
        {role:'system',content:'翻译为中文，只输出译文，不要解释。'},
        {role:'user',content:text}
      ],temperature:0.3,max_tokens:100})
    });
    const d = await r.json();
    return d.choices?.[0]?.message?.content?.trim() || '⚠️ 翻译失败';
  } catch(e) { return '⚠️ 翻译失败'; }
}

// ===== 刷新 =====
async function refresh() {
  const btn = document.getElementById('btnRefresh');
  const prog = document.getElementById('progress');
  const stat = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ 获取中…';
  prog.style.width = '10%';
  stat.textContent = '正在拉取海外热点…';

  const tasks = [
    ['🔥 热门Meme',  () => fetchMemes(15)],
    ['🌟 娱乐新闻',  () => fetchEntertainment()],
    ['🎬 电影资讯',  () => fetchTMDB()],
    ['🏈 体育热点',  () => fetchSports()],
    ['📹 视频热点',  () => fetchYouTube()],
    ['🔍 搜索趋势',  () => fetchGoogleTrends(20)],
  ];

  for (let i = 0; i < tasks.length; i++) {
    const [cat, fn] = tasks[i];
    prog.style.width = (10 + (i / tasks.length) * 85) + '%';
    stat.textContent = '⏳ 获取 ' + cat + '…';
    try { allData[cat] = await fn(); }
    catch(e) { allData[cat] = []; console.error('['+cat+']', e); }
    renderPanel(i);
  }
  prog.style.width = '100%';
  stat.textContent = '✅ 热点更新完成';
  setTimeout(() => prog.style.width = '0%', 2000);
  btn.disabled = false;
  btn.textContent = '🔄 刷新热点';
}

// ===== UI =====
function initUI(){
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  CATS.forEach((cat, i) => {
    const b = document.createElement('button');
    b.className = 'tab'; b.textContent = cat.name;
    b.style.setProperty('--tab-color', cat.color);
    b.onclick = () => switchTab(i);
    tabsEl.appendChild(b);
    const p = document.createElement('div');
    p.className = 'panel'; p.id = 'panel-' + i;
    p.style.setProperty('--cat-color', cat.color);
    p.style.setProperty('--cat-color-bg', cat.color + '10');
    contentEl.appendChild(p);
  });
  switchTab(0);
}

function switchTab(i){
  currentIdx = i;
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
}

function renderPanel(i){
  const cat = CATS[i];
  const items = allData[cat.name] || [];
  const shown = items.slice(0, 20);
  const p = document.getElementById('panel-' + i);
  if (!p) return;
  let h = '<div class="list-header"><span class="h-rank">#</span><span class="h-trans"></span><span class="h-bar"></span><span class="h-title">标题 / 来源</span><span class="h-actions"><button class="btn-translate-all" id="btnAll-' + i + '" ' + (shown.length ? '' : 'disabled') + ' onclick="translateAll(' + i + ')">全部翻译</button><span class="count">' + (shown.length ? shown.length + '条' : '暂无数据') + '</span></span></div>';
  h += '<div class="divider"></div><div class="item-list">';
  if (!shown.length) {
    h += '<div class="hint">暂无数据</div>';
  } else {
    shown.forEach((it, n) => {
      const rk = String(n + 1).padStart(2, '0');
      const src = it.source || '';
      const heat = it.score ? (it.score >= 1000 ? (it.score / 1000).toFixed(1) + 'k' : String(it.score)) : '';
      const titleAttr = it.title.replace(/"/g, '&quot;');
      h += '<div class="item" data-url="' + (it.url || '') + '" ondblclick="openLink(this)">'
        + '<span class="i-rank">' + rk + '</span>'
        + '<button class="i-trans" onclick="event.stopPropagation();translateOne(this,' + i + ',' + n + ')" title="翻译">译</button>'
        + '<span class="i-bar"></span>'
        + '<span class="i-title" data-org="' + titleAttr + '">' + it.title + '</span>'
        + (src ? '<span class="i-source">' + src + '</span>' : '')
        + (heat ? '<span class="i-heat">⬆ ' + heat + '</span>' : '')
        + '</div>';
    });
  }
  h += '</div>';
  p.innerHTML = h;
}

function openLink(el){ const u = el.dataset.url; if (u) window.open(u, '_blank'); }

async function translateOne(btn, catIdx, itemIdx){
  const item = allData[CATS[catIdx].name]?.[itemIdx];
  if (!item) return;
  const titleEl = btn.parentElement.querySelector('.i-title');
  const org = titleEl.dataset.org;
  if (btn.classList.contains('done')) {
    titleEl.textContent = org;
    titleEl.classList.remove('translated');
    btn.textContent = '译';
    btn.classList.remove('done');
    return;
  }
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    const r = await translateText(org);
    titleEl.textContent = r;
    titleEl.classList.add('translated');
    btn.classList.add('done');
    btn.textContent = '↩';
  } catch(e) { titleEl.textContent = '⚠️ 失败'; btn.textContent = '译'; }
  btn.disabled = false;
}

async function translateAll(catIdx){
  const p = document.getElementById('panel-' + catIdx);
  const btnAll = p.querySelector('.btn-translate-all');
  btnAll.disabled = true;
  const titles = p.querySelectorAll('.i-title');
  const btns = p.querySelectorAll('.i-trans');
  let done = 0, total = titles.length;
  for (let i = 0; i < total; i++) {
    if (btns[i].classList.contains('done')) { done++; continue; }
    btnAll.textContent = done + '/' + total;
    btns[i].disabled = true;
    btns[i].textContent = '⏳';
    try {
      const r = await translateText(titles[i].dataset.org);
      titles[i].textContent = r;
      titles[i].classList.add('translated');
      btns[i].classList.add('done');
      btns[i].textContent = '↩';
    } catch(e) { btns[i].textContent = '⚠️'; }
    btns[i].disabled = false;
    done++;
    btnAll.textContent = done + '/' + total;
  }
  btnAll.textContent = '✓ 已翻译';
}

// Start
initUI();
setTimeout(refresh, 300);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点雷达</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;background:#F8FAFC;color:#1E293B}
.app{max-width:1100px;margin:0 auto;padding:24px 32px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo{font-size:28px}
.title{font-size:22px;font-weight:800;color:#0F172A}
.subtitle{font-size:12px;color:#94A3B8;margin-left:4px}
.spacer{flex:1}
.btn-refresh{background:#3B82F6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;padding:10px 22px;cursor:pointer}
.btn-refresh:hover{background:#2563EB}
.btn-refresh:disabled{background:#CBD5E1;color:#94A3B8;cursor:not-allowed}
.status-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.progress-bar{flex:1;height:3px;background:#E2E8F0;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#3B82F6;border-radius:2px;width:0%;transition:width .3s}
.status-text{font-size:11px;color:#94A3B8;white-space:nowrap}
.tabs{display:flex;gap:0;border-bottom:2px solid #F1F5F9}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:#64748B;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--tab-color)}
.tab.active{color:var(--tab-color);border-bottom-color:var(--tab-color);font-weight:600}
.content{padding-top:16px}
.panel{display:none}
.panel.active{display:block}
.list-header{display:flex;align-items:center;gap:8px;padding:0 0 8px 0;font-size:10px;font-weight:600;color:#94A3B8}
.list-header .h-rank{width:24px;text-align:center}
.h-trans{width:26px}
.h-bar{width:4px}
.h-title{flex:1}
.h-actions{display:flex;align-items:center;gap:8px}
.btn-translate-all{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid var(--cat-color);color:var(--cat-color);background:transparent;cursor:pointer;white-space:nowrap}
.btn-translate-all:hover{background:var(--cat-color-bg)}
.btn-translate-all:disabled{color:#C0C8D4;border-color:#E2E8F0;cursor:not-allowed}
.count{font-size:10px;color:#94A3B8;white-space:nowrap}
.divider{height:1px;background:#F1F5F9;margin-bottom:10px}
.item-list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff;border:1px solid #E8ECF1;border-radius:10px;cursor:pointer;transition:all .15s}
.item:hover{background:#F0F6FF;border-color:#BFDBFE}
.i-rank{width:24px;text-align:center;font-size:11px;font-weight:700;color:var(--cat-color);flex-shrink:0}
.i-trans{width:26px;height:26px;border-radius:5px;border:1px solid #E8ECF1;border-color:color-mix(in srgb,var(--cat-color) 30%,transparent);color:var(--cat-color);background:transparent;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.i-trans:hover{background:color-mix(in srgb,var(--cat-color) 12%,transparent)}
.i-trans.done{background:color-mix(in srgb,var(--cat-color) 15%,transparent)}
.i-bar{width:4px;height:26px;border-radius:2px;background:var(--cat-color);flex-shrink:0}
.i-title{flex:1;font-size:13px;color:#1E293B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.i-title.translated{color:var(--cat-color);font-weight:500}
.i-source{font-size:10px;color:#475569;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:3px;padding:1px 6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.i-heat{font-size:10px;color:#94A3B8;min-width:46px;text-align:right;flex-shrink:0}
.hint{color:#94A3B8;font-size:11px;padding:16px 0;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="logo">📡</span>
    <div><span class="title">热点雷达</span><span class="subtitle">海外热点聚合 · 双击跳转原文</span></div>
    <span class="spacer"></span>
    <button class="btn-refresh" id="btnRefresh" onclick="refresh()">🔄 刷新热点</button>
  </div>
  <div class="status-bar">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <span class="status-text" id="status">就绪</span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ===== 配置 =====
// API 基础地址：留空表示同域（Flask 直接提供服务）
// 部署到 GitHub Pages 后，改成 Flask 后端的公网地址，例如：
// const API_BASE = 'https://hotspot-radar.onrender.com';
const API_BASE = '';

const CATS = [
  {name:'🔥 热门Meme',  color:'#E0646E'},
  {name:'🌟 娱乐新闻',  color:'#CB9842'},
  {name:'🎬 电影资讯',  color:'#787CE6'},
  {name:'🏈 体育热点',  color:'#44A87A'},
  {name:'📹 视频热点',  color:'#D0659E'},
  {name:'🔍 搜索趋势',  color:'#8B7CF6'},
];

let allData = {};
let currentIdx = 0;

// ===== 数据获取：全部走后端 API =====
async function apiGet(path) {
  const r = await fetch(API_BASE + path);
  if(!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

async function translateText(text) {
  const r = await fetch(API_BASE + '/api/translate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text:text})
  });
  const d = await r.json();
  return d.translated || '⚠️ 翻译失败';
}

// ===== 刷新 =====
async function refresh() {
  const btn = document.getElementById('btnRefresh');
  const prog = document.getElementById('progress');
  const stat = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ 获取中…';
  prog.style.width = '30%';
  stat.textContent = '正在拉取海外热点…';

  try {
    const data = await apiGet('/api/refresh');
    allData = data;
    for(let i = 0; i < CATS.length; i++) renderPanel(i);
    prog.style.width = '100%';
    stat.textContent = '✅ 热点更新完成';
  } catch(e) {
    prog.style.width = '100%';
    stat.textContent = '❌ 获取失败：' + e.message;
  }
  setTimeout(() => prog.style.width = '0%', 2000);
  btn.disabled = false;
  btn.textContent = '🔄 刷新热点';
}

// ===== UI =====
function initUI(){
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  CATS.forEach((cat, i) => {
    const b = document.createElement('button');
    b.className = 'tab';
    b.textContent = cat.name;
    b.style.setProperty('--tab-color', cat.color);
    b.onclick = () => switchTab(i);
    tabsEl.appendChild(b);
    const p = document.createElement('div');
    p.className = 'panel';
    p.id = 'panel-' + i;
    p.style.setProperty('--cat-color', cat.color);
    p.style.setProperty('--cat-color-bg', cat.color + '10');
    contentEl.appendChild(p);
  });
  switchTab(0);
}

function switchTab(i){
  currentIdx = i;
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
}

function renderPanel(i){
  const cat = CATS[i];
  const items = allData[cat.name] || [];
  const shown = items.slice(0, 20);
  const p = document.getElementById('panel-' + i);
  if(!p) return;
  let h = '';
  h += '<div class="list-header"><span class="h-rank">#</span><span class="h-trans"></span><span class="h-bar"></span><span class="h-title">标题 / 来源</span><span class="h-actions"><button class="btn-translate-all" id="btnAll-' + i + '" ' + (shown.length ? '' : 'disabled') + ' onclick="translateAll(' + i + ')">全部翻译</button><span class="count">' + (shown.length ? shown.length + '条' : '暂无数据') + '</span></span></div>';
  h += '<div class="divider"></div><div class="item-list">';
  if(!shown.length) {
    h += '<div class="hint">暂无数据</div>';
  } else {
    shown.forEach((it, n) => {
      const rk = String(n + 1).padStart(2, '0');
      const src = it.source || '';
      const heat = it.score ? (it.score >= 1000 ? (it.score / 1000).toFixed(1) + 'k' : String(it.score)) : '';
      const titleAttr = it.title.replace(/"/g, '&quot;');
      h += '<div class="item" data-url="' + (it.url || '') + '" ondblclick="openLink(this)">'
        + '<span class="i-rank">' + rk + '</span>'
        + '<button class="i-trans" onclick="event.stopPropagation();translateOne(this,' + i + ',' + n + ')" title="翻译">译</button>'
        + '<span class="i-bar"></span>'
        + '<span class="i-title" data-org="' + titleAttr + '">' + it.title + '</span>'
        + (src ? '<span class="i-source">' + src + '</span>' : '')
        + (heat ? '<span class="i-heat">⬆ ' + heat + '</span>' : '')
        + '</div>';
    });
  }
  h += '</div>';
  p.innerHTML = h;
}

function openLink(el){
  const u = el.dataset.url;
  if(u) window.open(u, '_blank');
}

async function translateOne(btn, catIdx, itemIdx){
  const item = allData[CATS[catIdx].name]?.[itemIdx];
  if(!item) return;
  const titleEl = btn.parentElement.querySelector('.i-title');
  const org = titleEl.dataset.org;
  if(btn.classList.contains('done')){
    titleEl.textContent = org;
    titleEl.classList.remove('translated');
    btn.textContent = '译';
    btn.classList.remove('done');
    return;
  }
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    const r = await translateText(org);
    titleEl.textContent = r;
    titleEl.classList.add('translated');
    btn.classList.add('done');
    btn.textContent = '↩';
  } catch(e) {
    titleEl.textContent = '⚠️ 失败';
    btn.textContent = '译';
  }
  btn.disabled = false;
}

async function translateAll(catIdx){
  const items = allData[CATS[catIdx].name] || [];
  const p = document.getElementById('panel-' + catIdx);
  const btnAll = p.querySelector('.btn-translate-all');
  btnAll.disabled = true;
  const titles = p.querySelectorAll('.i-title');
  const btns = p.querySelectorAll('.i-trans');
  let done = 0, total = titles.length;
  for(let i = 0; i < total; i++){
    if(btns[i].classList.contains('done')){ done++; continue; }
    btnAll.textContent = done + '/' + total;
    btns[i].disabled = true;
    btns[i].textContent = '⏳';
    try {
      const r = await translateText(titles[i].dataset.org);
      titles[i].textContent = r;
      titles[i].classList.add('translated');
      btns[i].classList.add('done');
      btns[i].textContent = '↩';
    } catch(e) {
      btns[i].textContent = '⚠️';
    }
    btns[i].disabled = false;
    done++;
    btnAll.textContent = done + '/' + total;
  }
  btnAll.textContent = '✓ 已翻译';
}

// Start
initUI();
setTimeout(refresh, 300);
</script>
</body>
</html>
